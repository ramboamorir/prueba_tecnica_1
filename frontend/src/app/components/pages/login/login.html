<div class="container mt-5">
  <div class="card p-4">
    <h3>Login</h3>

    <input class="form-control mb-2" [(ngModel)]="form.email" placeholder="Email">
    <input class="form-control mb-2" [(ngModel)]="form.password" type="password" placeholder="Password">

    <button class="btn btn-primary w-100" (click)="login()">Ingresar</button>
  </div>
</div>
